name: Build and push backend image

# Builds the backend Docker image and pushes it to the GitHub Container Registry
# (ghcr.io). The deploy server never builds — it only pulls this image
# (see docker-compose.prod.yml + `make prod deploy`).
#
# Tags produced:
#   - latest            (only on the default branch)
#   - sha-<full-sha>    (every build — use this to pin an exact commit in prod)
#   - vX.Y.Z / X.Y.Z    (when a git tag like v1.2.3 is pushed)

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Gate: the image is only built/pushed if the suite passes. Mirrors the GitLab
  # `test -> build` order and runs the same standalone compose file, so behaviour
  # can't drift between the two CI systems.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run test suite
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # github.repository keeps the owner/repo casing as typed on GitHub, but Docker
      # refs must be lowercase — lowercase it before it reaches the image name.
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile          # prod image: multi-stage, no dev deps (INSTALL_DEV stays false)
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
