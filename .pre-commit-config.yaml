repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --config backend/pyproject.toml --force-exclude
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: ruff format --config backend/pyproject.toml --force-exclude
        language: system
        types: [python]
