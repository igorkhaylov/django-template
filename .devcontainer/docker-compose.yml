services:
  backend:
    build:
      context: .
      dockerfile: ./.devcontainer/backend/Dockerfile
    volumes:
      - ./backend:/app
      - vscode-data:/root/.vscode-server
      - vscode-cache:/root/.cache
    healthcheck:
      test: [ "CMD-SHELL", "exit 0" ]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    command: sleep infinity
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy

  db:
    deploy:
      resources:
        limits:
          memory: "256m"

  # --- MINIO SERVICES ---
  minio:
    # image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    # last version with full ui
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1
    env_file:
      - ./.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: "${MINIO_BROWSER_REDIRECT_URL}"
    expose:
      - "9000" # S3 API
      - "9001" # Web-консоль
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9000'" ]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: "256m"

  # ---------- Одноразовый инициализатор MinIO ----------
  create-buckets:
    # image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    image: alpine:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_APP_USER: ${MINIO_APP_USER}
      MINIO_APP_PASSWORD: ${MINIO_APP_PASSWORD}
    volumes:
      - ./.docker/minio/policies:/policies
      - ./.docker/minio/init_minio.sh:/init_minio.sh
    entrypoint: [ "/bin/sh", "/init_minio.sh" ]
    restart: on-failure

  # --- NGINX OVERRIDE: добавляем MinIO proxy поверх production конфига ---
  nginx:
    volumes:
      - ./.devcontainer/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9050:9000"  # MinIO S3 API + Console UI
    depends_on:
      minio:
        condition: service_healthy

volumes:
  vscode-data:
  vscode-cache:
  minio-data:
