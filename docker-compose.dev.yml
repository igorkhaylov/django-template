name: ${PROJECT_NAME:-django-template}-dev


# Caps Docker's json-file logs so they can't fill the disk (default driver has no rotation).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"


x-backend-defaults: &backend-defaults
  build:
    context: .
    dockerfile: ./Dockerfile.dev
  env_file:
    - ./.env
  logging: *default-logging
  # Lets the backend reach the shared host MinIO via host.docker.internal on Linux
  # (no-op/automatic on Docker Desktop).
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    # The whole repo is mounted at /app; manage.py lives at /app/backend (see Makefile EXEC).
    - .:/app
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  command: sleep infinity
  restart: unless-stopped


services:
  backend:
    <<: *backend-defaults
    expose:
      - 8000

  redis:
    image: redis:8
    logging: *default-logging
    expose:
      - 6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 5
      timeout: 3s
    restart: unless-stopped

  db:
    image: postgres:17.4
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - 5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      retries: 5
      timeout: 3s
    restart: unless-stopped

  # NOTE: MinIO is a single SHARED host service, not a per-project container.
  # Provision it once with `make minio` (./scripts/ensure_minio.sh). The backend
  # reaches it via DJANGO_MINIO_ENDPOINT=http://host.docker.internal:9000.

  nginx:
    image: nginx:stable-alpine
    logging: *default-logging
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${APP_PORT:-8050}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped


volumes:
  postgres-data:
  redis-data:
